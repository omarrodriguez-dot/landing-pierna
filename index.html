
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body, .page { min-height: 100vh; background: #0a0a0a; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; padding: 2rem 1rem; }
  .card { width: 100%; max-width: 420px; background: #111; border-radius: 24px; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.08); }
  .cover-area { position: relative; width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #1a0a2e 0%, #2d1040 40%, #0d1a2e 100%); display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .cover-placeholder { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .cover-img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; }
  .cover-img.loaded { display: block; }
  .vinyl { width: 120px; height: 120px; border-radius: 50%; background: conic-gradient(from 0deg, #1a1a1a, #333, #1a1a1a, #2a2a2a, #1a1a1a); border: 3px solid rgba(255,255,255,0.05); position: relative; }
  .vinyl::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 28px; height: 28px; background: #0a0a0a; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); }
  .noise-overlay { position: absolute; inset: 0; pointer-events: none; opacity: 0.4; }
  .info { padding: 1.5rem 1.5rem 0.5rem; text-align: center; }
  .song-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #fff; line-height: 1.2; letter-spacing: -0.3px; margin-bottom: 6px; }
  .artist-name { font-size: 13px; font-weight: 400; color: rgba(255,255,255,0.45); letter-spacing: 1.5px; text-transform: uppercase; }
  .divider { margin: 1rem 1.5rem; height: 0.5px; background: rgba(255,255,255,0.07); }
  .listen-label { padding: 0 1.5rem; font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.3); letter-spacing: 1.8px; text-transform: uppercase; margin-bottom: 0.75rem; text-align: center; }
  .platforms { padding: 0 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 10px; }
  .platform-btn { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 14px; border: 0.5px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); cursor: pointer; transition: all 0.2s ease; text-decoration: none; position: relative; overflow: hidden; }
  .platform-btn::before { content: ''; position: absolute; inset: 0; opacity: 0; transition: opacity 0.2s; }
  .platform-btn:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.18); }
  .platform-btn:hover::before { opacity: 1; }
  .platform-btn:active { transform: scale(0.98); }
  .btn-spotify::before { background: rgba(30,215,96,0.06); }
  .btn-spotify:hover { border-color: rgba(30,215,96,0.35); }
  .btn-apple::before { background: rgba(252,82,82,0.06); }
  .btn-apple:hover { border-color: rgba(252,82,82,0.35); }
  .btn-youtube::before { background: rgba(255,0,0,0.06); }
  .btn-youtube:hover { border-color: rgba(255,0,0,0.3); }
  .btn-amazon::before { background: rgba(0,168,255,0.06); }
  .btn-amazon:hover { border-color: rgba(0,168,255,0.3); }
  .btn-tidal::before { background: rgba(255,255,255,0.04); }
  .btn-tidal:hover { border-color: rgba(255,255,255,0.25); }
  .platform-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; z-index: 1; }
  .platform-icon svg { width: 20px; height: 20px; }
  .platform-text { flex: 1; position: relative; z-index: 1; }
  .platform-name { font-size: 14px; font-weight: 500; color: #fff; display: block; }
  .platform-sub { font-size: 11px; color: rgba(255,255,255,0.35); display: block; margin-top: 1px; }
  .platform-arrow { position: relative; z-index: 1; color: rgba(255,255,255,0.2); font-size: 16px; transition: transform 0.2s, color 0.2s; }
  .platform-btn:hover .platform-arrow { transform: translateX(3px); color: rgba(255,255,255,0.5); }
  .footer { padding: 0 1.5rem 1.25rem; text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); }
  .upload-hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: rgba(255,255,255,0.6); font-size: 11px; padding: 5px 14px; border-radius: 20px; white-space: nowrap; font-family: 'DM Sans', sans-serif; z-index: 10; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.1); }
  #fileInput { display: none; }
</style>

<div class="page">

      <div class="cover-placeholder" id="coverPlaceholder">
        <div class="vinyl"></div>
      </div>
      <div class="noise-overlay"></div>
      <label class="upload-hint" for="fileInput">+ Subir portada</label>
      <input type="file" id="fileInput" accept="image/*" />
    </div>

    <div class="info">
      <div class="song-title">No estaba claro (Sí lo estaba)</div>
      <div class="artist-name">La Pierna de Santana</div>

    <div class="divider"></div>
    <div class="listen-label">Escúchalo en</div>

    <div class="platforms">

      <a class="platform-btn btn-apple" href="https://music.apple.com/us/album/no-estaba-claro-si-lo-estaba-single/1892260086" target="_blank">
        <div class="platform-icon">
          <svg viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="#FC3C44"/><path d="M15.5 6.5v7.6c0 .9-.3 1.6-.9 2.1-.6.5-1.4.8-2.4.8-.8 0-1.5-.3-2-.8-.5-.5-.8-1.1-.8-1.9 0-.8.3-1.4.8-1.9.5-.5 1.2-.7 2.1-.7.5 0 1 .1 1.4.3V8.1l-5 1.3v5.8c0 .9-.3 1.6-.9 2.1-.6.5-1.4.8-2.4.8-.8 0-1.5-.3-2-.8-.5-.5-.8-1.1-.8-1.9 0-.8.3-1.4.8-1.9.5-.5 1.2-.7 2.1-.7.5 0 1 .1 1.4.3V7.1c0-.5.4-.9.9-1l5-1.3c.3-.1.5 0 .7.2.2.2.3.4.3.7l-.3-.2z" fill="white"/></svg>

        <span class="platform-arrow">›</span>
      </a>

      <a class="platform-btn btn-youtube" href="https://youtu.be/RhnyfkBklH0?si=6LY-v2hitV8xZ6ll" target="_blank">
        <div class="platform-icon">
          <svg viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="#FF0000"/><path d="M19.5 8.5s-.2-1.2-.8-1.7c-.7-.8-1.5-.8-1.9-.8C14.5 6 12 6 12 6s-2.5 0-4.8.1c-.4 0-1.2.1-1.9.8-.6.5-.8 1.7-.8 1.7S4.3 9.8 4.3 11v1.1c0 1.3.2 2.5.2 2.5s.2 1.2.8 1.7c.7.8 1.7.7 2.1.8 1.5.1 6.5.2 6.5.2s2.5 0 4.9-.1c.4 0 1.2-.1 1.9-.8.6-.5.8-1.7.8-1.7s.2-1.2.2-2.5v-1c.1-1.3-.2-2.6-.2-2.6zm-9.5 5v-4.3l5.2 2.2-5.2 2.1z" fill="white"/></svg>

</div>

<script>
  const fileInput = document.getElementById('fileInput');
  const coverImg = document.getElementById('coverImg');
  const coverPlaceholder = document.getElementById('coverPlaceholder');
  fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      coverImg.src = ev.target.result;
      coverImg.classList.add('loaded');
      coverPlaceholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
  });
</script>
