<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Pierna de Santana - No estaba claro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body, .page { 
      min-height: 100vh; 
      background: #0a0a0a; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-family: 'DM Sans', sans-serif; 
      padding: 2rem 1rem; 
    }
    
    .card { 
      width: 100%; 
      max-width: 420px; 
      background: #111; 
      border-radius: 24px; 
      overflow: hidden; 
      border: 0.5px solid rgba(255,255,255,0.08); 
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    .cover-area { 
      position: relative; 
      width: 100%; 
      aspect-ratio: 1; 
      background: #1a1a1a; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      overflow: hidden; 
    }
    
    .cover-img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      display: block; /* Siempre visible */
    }
    
    .noise-overlay { 
      position: absolute; 
      inset: 0; 
      pointer-events: none; 
      opacity: 0.4; 
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
    
    .info { padding: 1.5rem 1.5rem 0.5rem; text-align: center; }
    
    .song-title { 
      font-family: 'Playfair Display', serif; 
      font-size: 22px; 
      font-weight: 700; 
      color: #fff; 
      line-height: 1.2; 
      letter-spacing: -0.3px; 
      margin-bottom: 6px; 
    }
    
    .artist-name { 
      font-size: 13px; 
      font-weight: 400; 
      color: rgba(255,255,255,0.45); 
      letter-spacing: 1.5px; 
      text-transform: uppercase; 
    }
    
    .divider { margin: 1rem 1.5rem; height: 0.5px; background: rgba(255,255,255,0.07); }
    
    .listen-label { 
      padding: 0 1.5rem; 
      font-size: 11px; 
      font-weight: 500; 
      color: rgba(255,255,255,0.3); 
      letter-spacing: 1.8px; 
      text-transform: uppercase; 
      margin-bottom: 0.75rem; 
      text-align: center; 
    }
    
    .platforms { padding: 0 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 10px; }
    
    .platform-btn { 
      display: flex; 
      align-items: center; 
      gap: 14px; 
      padding: 14px 18px; 
      border-radius: 14px; 
      border: 0.5px solid rgba(255,255,255,0.08); 
      background: rgba(255,255,255,0.03); 
      cursor: pointer; 
      transition: all 0.2s ease; 
      text-decoration: none; 
      position: relative; 
    }
    
    .platform-btn:hover { 
      transform: translateY(-1px); 
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.18); 
    }
    
    .btn-spotify:hover { border-color: rgba(30,215,96,0.35); }
    .btn-apple:hover { border-color: rgba(252,82,82,0.35); }
    
    .platform-icon { 
      width: 32px; 
      height: 32px; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      flex-shrink: 0; 
    }
    
    .platform-icon svg { width: 20px; height: 20px; }
    
    .platform-text { flex: 1; }
    .platform-name { font-size: 14px; font-weight: 500; color: #fff; display: block; }
    .platform-sub { font-size: 11px; color: rgba(255,255,255,0.35); display: block; }
    
    .platform-arrow { color: rgba(255,255,255,0.2); font-size: 16px; }
    
    .footer { padding: 0 1.5rem 1.25rem; text-align: center; font-size: 11px; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<div class="page">
  <div class="card">
    <div class="cover-area">
      <img 
        class="cover-img" 
        src="9c4f90d8-cc39-4891-90b0-5f314bd24e84.JPG" 
        alt="Portada - No estaba claro"
      >
      <div class="noise-overlay"></div>
    </div>

    <div class="info">
      <div class="song-title">No estaba claro (Sí lo estaba)</div>

        </div>
        <div class="platform-text"><span class="platform-name">Spotify</span><span class="platform-sub">Streaming</span></div>
        <span class="platform-arrow">›</span>

      <a class="platform-btn btn-apple" href="https://music.apple.com/us/album/no-estaba-claro-si-lo-estaba-single/1892260086" target="_blank">

        <span class="platform-arrow">›</span>
      </a>

      <a class="platform-btn" href="https://youtu.be/RhnyfkBklH0?si=6LY-v2hitV8xZ6ll" target="_blank">
        <div class="platform-icon">
          <svg viewBox="0 0 24 24"><rect width="24" height="24" rx="6" fill="#FF0000"/><path d="M19.5 8.5s-.2-1.2-.8-1.7c-.7-.8-1.5-.8-1.9-.8C14.5 6 12 6 12 6s-2.5 0-4.8.1c-.4 0-1.2.1-1.9.8-.6.5-.8 1.7-.8 1.7S4.3 9.8 4.3 11v1.1c0 1.3.2 2.5.2 2.5s.2 1.2.8 1.7c.7.8 1.7.7 2.1.8 1.5.1 6.5.2 6.5.2s2.5 0 4.9-.1c.4 0 1.2-.1 1.9-.8.6-.5.8-1.7.8-1.7s.2-1.2.2-2.5v-1c.1-1.3-.2-2.6-.2-2.6zm-9.5 5v-4.3l5.2 2.2-5.2 2.1z" fill="white"/></svg>
        </div>
        <div class="platform-text"><span class="platform-name">YouTube</span><span class="platform-sub">Ver video</span></div>
        <span class="platform-arrow">›</span>
      </a>
    </div>

    <div class="footer">La Pierna de Santana · 2025</div>
  </div>
</div>

</body>
</html>
